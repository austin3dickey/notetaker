# Robolectric normally runs tests against compileSdk (36), but android.jar 36 is built
# with Java 21 bytecode. We build with JDK 17 so we pin Robolectric to SDK 34, which is
# Java 17-compatible. None of the behaviors we test (Room, coroutines, StateFlow) differ
# between SDK 34 and 36 — bump this if a test ever needs 35+-only APIs.
sdk=34
