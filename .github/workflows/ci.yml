name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build & test (${{ matrix.variant }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: debug
            gradle-tasks: lintDebug testDebugUnitTest assembleDebug
          - variant: release
            gradle-tasks: testReleaseUnitTest assembleRelease
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      # Debug variant runs lint + unit tests + assemble; release variant runs unit
      # tests + assemble (exercises R8 and resource shrinking). testBuildType must
      # match the test task — AGP only generates the unit-test task for one
      # variant at a time.
      - name: Build & test
        env:
          GRADLE_TASKS: ${{ matrix.gradle-tasks }}
          BUILD_TYPE: ${{ matrix.variant }}
        run: |
          read -ra tasks <<< "$GRADLE_TASKS"
          ./gradlew "${tasks[@]}" -PtestBuildType="$BUILD_TYPE" --no-daemon
