name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407  # v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d  # v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Unit tests (debug variant — BuildConfig.DEBUG = true)
        run: ./gradlew testDebugUnitTest -PtestBuildType=debug --no-daemon

      - name: Unit tests (release variant — BuildConfig.DEBUG = false)
        run: ./gradlew testReleaseUnitTest -PtestBuildType=release --no-daemon

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Assemble release (exercises R8 and resource shrinking)
        run: ./gradlew assembleRelease --no-daemon
