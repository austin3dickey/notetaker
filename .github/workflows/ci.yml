name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Unit tests (debug variant — BuildConfig.DEBUG = true)
        run: ./gradlew testDebugUnitTest -PtestBuildType=debug --no-daemon

      - name: Unit tests (release variant — BuildConfig.DEBUG = false)
        run: ./gradlew testReleaseUnitTest -PtestBuildType=release --no-daemon

      - name: Assemble debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Assemble release (exercises R8 and resource shrinking)
        run: ./gradlew assembleRelease --no-daemon
